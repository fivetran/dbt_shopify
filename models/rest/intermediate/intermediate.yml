version: 2

models:
  - name: shopify__customers__order_aggregates
  - name: shopify__orders__order_line_aggregates

  - name: shopify__orders__order_refunds
    description: >
      Line-level refund data for orders, separating out gift card refunds, as they are not part of Shopify refund reporting.
    columns:
      - name: refund_id
        description: The unique identifier of the refund.
      - name: order_line_id
        description: The unique identifier of the order line item being refunded.
      - name: subtotal
        description: >
          Subtotal amount of the refund.
      - name: total_tax
        description: >
          Tax amount of the refund.
      - name: gift_card_refund_subtotal
        description: >
          Subtotal amount of gift card refunds only.
      - name: gift_card_refund_tax
        description: >
          Tax amount of gift card refunds only.
      - name: is_gift_card
        description: >
          Boolean flag indicating if this refund is for a gift card.

  - name: int_shopify__discount_aggregates
    description: >
      Aggregates discount amounts from DISCOUNT_ALLOCATION table.
    columns:
      - name: order_id
        description: The unique identifier of the order.
      - name: order_total_discount
        description: Total discount amount for the order.
      - name: source_relation
        description: "{{ doc('source_relation') }}"

  - name: int_shopify__refund_adjustments_aggregates
    description: >
      Aggregates refund adjustments, filtering for 'refund_discrepancy' type. Refund discrepancies must be subtracted from returns to match Shopify Analytics.
    columns:
      - name: order_id
        description: The unique identifier of the order.
      - name: order_refund_discrepancy_amount
        description: Total refund discrepancy amount (kind = 'refund_discrepancy').
      - name: order_refund_discrepancy_tax
        description: Tax portion of refund discrepancies.
      - name: order_other_adjustment_amount
        description: Total of all other adjustment types (not refund_discrepancy).

  - name: int_shopify__emails__order_aggregates
  - name: int_shopify__customer_email_rollup
  - name: int_shopify__inventory_level__aggregates
  - name: int_shopify__discounts__order_aggregates
  - name: int_shopify__discounts__abandoned_checkouts
  - name: int_shopify__order__shipping_aggregates
  - name: int_shopify__product__order_line_aggregates
  - name: int_shopify__products_with_aggregates
 
  - name: int_shopify__refund_adjustments_aggregates
    description: >
      Aggregates refund adjustments by order.
    columns:
      - name: order_id
        description: The unique identifier of the order.
        tests:
          - not_null 
      - name: source_relation
        description: "{{ doc('source_relation') }}"

      - name: order_refund_discrepancy_amount
        description: >
          Total refund discrepancy amount for the order (kind = 'refund_discrepancy'). These are accounting
          adjustments that must be subtracted from return totals to match Shopify Analytics reporting.

      - name: order_refund_discrepancy_tax
        description: Tax portion of refund discrepancy adjustments.

      - name: order_other_adjustment_amount
        description: Total of all other adjustment types (not refund_discrepancy).
